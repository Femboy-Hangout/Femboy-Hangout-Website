<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>💝 Femboy Hangout ✨</title>
        <script src="index.js"></script>

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap');
            
            :root {
                --pink-soft: #ffc8dd;
                --pink-deep: #ffafcc;
                --purple-soft: #b185db;
                --purple-deep: #7b2cbf;
                --white-glass: rgba(255, 255, 255, 0.7);
                --text-main: #4a306d;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Quicksand', sans-serif;
                min-height: 100vh;
                color: var(--text-main);
                overflow-x: hidden;
                background: linear-gradient(-45deg, #ffc8dd, #ffafcc, #b185db, #a2d2ff);
                background-size: 400% 400%;
                animation: gradientBG 15s ease infinite;
            }
        </style>
    </head>
    <body>
        <div class="decoration-heart">🌸</div>
        <div class="decoration-sparkle">✨</div>
        <div class="decoration-paw">🐾</div>
        <div class="decoration-star">🎀</div>
    </body>
</html>
